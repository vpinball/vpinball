name: vpinball
on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  VERSION_START_SHA: ea558e7417f6f06fe567d34f0e33792a141b8e64

defaults:
  run:
    shell: bash

jobs:
  version:
    name: Version
    runs-on: ubuntu-24.04
    outputs:
      revision: ${{ steps.version.outputs.revision }}
      version_short: ${{ steps.version.outputs.version_short }}
      version_full: ${{ steps.version.outputs.version_full }}
      version_ios: ${{ steps.version.outputs.version_ios }}
      sha_short: ${{ steps.version.outputs.sha_short }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: version
        run: |
          REVISION=$(git rev-list ${{ env.VERSION_START_SHA }}..HEAD --count)
          VERSION_MAJOR=$(grep -Eo "VP_VERSION_MAJOR\s+[0-9]+" src/core/vpversion.h | grep -Eo "[0-9]+")
          VERSION_MINOR=$(grep -Eo "VP_VERSION_MINOR\s+[0-9]+" src/core/vpversion.h | grep -Eo "[0-9]+")
          VERSION_REV=$(grep -Eo "VP_VERSION_REV\s+[0-9]+" src/core/vpversion.h | grep -Eo "[0-9]+")
          VERSION_NUMERIC=$((VERSION_MAJOR * 10000 + VERSION_MINOR * 100 + VERSION_REV))
          VERSION_SHORT="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REV}"
          VERSION_FULL="${VERSION_SHORT}.${REVISION}"
          VERSION_IOS="${VERSION_NUMERIC}.0.${REVISION}"
          SHA_SHORT=$(git rev-parse --short "${GITHUB_SHA}")
          TAG="${VERSION_SHORT}-${REVISION}-${SHA_SHORT}"
          echo "revision=${REVISION}" >> $GITHUB_OUTPUT
          echo "version_short=${VERSION_SHORT}" >> $GITHUB_OUTPUT
          echo "version_full=${VERSION_FULL}" >> $GITHUB_OUTPUT
          echo "version_ios=${VERSION_IOS}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  matrix:
    name: Matrix
    runs-on: ubuntu-24.04
    outputs:
      desktop: ${{ steps.matrix.outputs.desktop }}
      dx: ${{ steps.matrix.outputs.dx }}
      sbc: ${{ steps.matrix.outputs.sbc }}
      android_flavors: ${{ steps.matrix.outputs.android_flavors }}
    steps:
      - id: matrix
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            DESKTOP='{"include":[
              {"os":"windows-2025-vs2026","type":"BGFX","platform":"windows","arch":"x64","config":"Release"},
              {"os":"windows-2025-vs2026","type":"BGFX","platform":"windows","arch":"x64","config":"Debug"},
              {"os":"windows-2025-vs2026","type":"BGFX","platform":"windows","arch":"x86","config":"Release"},
              {"os":"windows-2025-vs2026","type":"BGFX","platform":"windows","arch":"x86","config":"Debug"},
              {"os":"windows-2025-vs2026","type":"BGFX","platform":"windows-mingw","arch":"x64","config":"Release"},
              {"os":"macos-15","type":"BGFX","platform":"macos","arch":"arm64","config":"Release"},
              {"os":"macos-15","type":"BGFX","platform":"macos","arch":"x64","config":"Release"},
              {"os":"ubuntu-24.04","type":"BGFX","platform":"linux","arch":"x64","config":"Release"},
              {"os":"windows-2025-vs2026","type":"GL","platform":"windows","arch":"x64","config":"Release"},
              {"os":"windows-2025-vs2026","type":"GL","platform":"windows","arch":"x86","config":"Release"},
              {"os":"windows-2025-vs2026","type":"GL","platform":"windows","arch":"x64","config":"Debug"},
              {"os":"windows-2025-vs2026","type":"GL","platform":"windows","arch":"x86","config":"Debug"},
              {"os":"macos-15","type":"GL","platform":"macos","arch":"arm64","config":"Release"},
              {"os":"macos-15","type":"GL","platform":"macos","arch":"x64","config":"Release"},
              {"os":"ubuntu-24.04","type":"GL","platform":"linux","arch":"x64","config":"Release"}
            ]}'
            SBC='{"include":[
              {"os":"ubuntu-24.04-arm","type":"BGFX","board":"rpi","platform":"linux","arch":"aarch64","config":"Release"},
              {"os":"ubuntu-24.04-arm","type":"BGFX","board":"rk3588","platform":"linux","arch":"aarch64","config":"Release"},
              {"os":"ubuntu-24.04-arm","type":"GL","board":"rpi","platform":"linux","arch":"aarch64","config":"Release"},
              {"os":"ubuntu-24.04-arm","type":"GL","board":"rk3588","platform":"linux","arch":"aarch64","config":"Release"}
            ]}'
            DX='{"include":[
              {"platform":"windows","arch":"x64","config":"Release"},
              {"platform":"windows","arch":"x64","config":"Debug"},
              {"platform":"windows","arch":"x86","config":"Release"},
              {"platform":"windows","arch":"x86","config":"Debug"}
            ]}'
            ANDROID_FLAVORS='["quest","mobile"]'
          else
            DESKTOP='{"include":[
              {"os":"windows-2025-vs2026","type":"BGFX","platform":"windows","arch":"x64","config":"Release"},
              {"os":"windows-2025-vs2026","type":"BGFX","platform":"windows-mingw","arch":"x64","config":"Release"},
              {"os":"macos-15","type":"BGFX","platform":"macos","arch":"arm64","config":"Release"},
              {"os":"ubuntu-24.04","type":"BGFX","platform":"linux","arch":"x64","config":"Release"},
              {"os":"ubuntu-24.04","type":"GL","platform":"linux","arch":"x64","config":"Release"}
            ]}'
            SBC='{"include":[
              {"os":"ubuntu-24.04-arm","type":"BGFX","board":"rpi","platform":"linux","arch":"aarch64","config":"Release"}
            ]}'
            DX='{"include":[
              {"platform":"windows","arch":"x64","config":"Release"}
            ]}'
            ANDROID_FLAVORS='["mobile"]'
          fi
          echo "desktop=$(echo "$DESKTOP" | jq -c .)" >> $GITHUB_OUTPUT
          echo "dx=$(echo "$DX" | jq -c .)" >> $GITHUB_OUTPUT
          echo "sbc=$(echo "$SBC" | jq -c .)" >> $GITHUB_OUTPUT
          echo "android_flavors=${ANDROID_FLAVORS}" >> $GITHUB_OUTPUT

  build-desktop:
    name: Build VPinballX_${{ matrix.type }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    needs: [ version, matrix ]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.desktop) }}
    steps:
      - if: (matrix.platform == 'windows' || matrix.platform == 'windows-mingw')
        uses: microsoft/setup-msbuild@v3
      - if: (matrix.platform == 'windows' || matrix.platform == 'windows-mingw')
        run: |
          /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm make diffutils nasm bison git autoconf automake libtool"
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-zlib mingw-w64-ucrt-x86_64-libwinpthread mingw-w64-ucrt-x86_64-libiconv mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-tools"
          else
            /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm mingw-w64-i686-gcc mingw-w64-i686-zlib mingw-w64-i686-libwinpthread mingw-w64-i686-libiconv mingw-w64-i686-cmake"
          fi
      - if: (matrix.platform == 'macos')
        run: |
          brew install bison autoconf automake libtool nasm create-dmg
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
      - if: (matrix.platform == 'linux')
        run: |
          sudo apt-get update
          sudo apt install cmake nasm bison zlib1g-dev libdrm-dev libgbm-dev libglu1-mesa-dev libegl-dev libgl1-mesa-dev libwayland-dev libwayland-egl-backend-dev libudev-dev libx11-dev libxcursor-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libxrandr-dev libasound2-dev libpipewire-0.3-dev
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/${{ matrix.platform }}-${{ matrix.arch }}/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: external
          key: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}-external-
      - name: Build external cache
        run: |
          if [[ "${{ matrix.platform }}" == "windows-mingw" ]]; then
            CURRENT_DIR="$(pwd)"
            MSYSTEM=UCRT64 /c/msys64/usr/bin/bash.exe -l -c "
              cd \"${CURRENT_DIR}\" &&
              BUILD_TYPE=${{ matrix.config }} ./platforms/${{ matrix.platform }}-${{ matrix.arch }}/external.sh
            "
          else
            BUILD_TYPE=${{ matrix.config }} ./platforms/${{ matrix.platform }}-${{ matrix.arch }}/external.sh
          fi
      - if: github.event_name == 'push' && steps.cache.outputs.cache-hit != 'true'
        name: Clean external cache
        run: |
          find external -type d -name ".git" -exec rm -rf {} + 2>/dev/null || true
          find external -name "*.tar.gz" -delete 2>/dev/null || true
          find external \( -name "*.o" -o -name "*.obj" \) -delete 2>/dev/null || true
      - if: github.event_name == 'push' && steps.cache.outputs.cache-hit != 'true'
        name: Save external cache
        uses: actions/cache/save@v5
        with:
          path: external
          key: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}-external-${{ env.EXT_HASH }}
      - if: ((matrix.platform == 'windows' || matrix.platform == 'windows-mingw') && matrix.type == 'BGFX')
        name: Package third-party artifacts
        run: |
          cd third-party && 7z a -r ../VPinballX-${{ needs.version.outputs.tag }}-dev-third-party-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}.zip .
      - if: ((matrix.platform == 'windows' || matrix.platform == 'windows-mingw') && matrix.type == 'BGFX')
        name: Save third-party artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VPinballX-${{ needs.version.outputs.tag }}-dev-third-party-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}
          path: VPinballX-${{ needs.version.outputs.tag }}-dev-third-party-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}.zip
          archive: false
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha_short }}/g" src/core/git_version.h
      - name: Build
        run: |
          CMAKE_ARGS="-DRENDERER=${{ matrix.type }} -DPLATFORM=${{ matrix.platform }} -DARCH=${{ matrix.arch }}"
          if [[ "${{ matrix.platform }}" == "windows-mingw" ]]; then
            CURRENT_DIR="$(pwd)"
            MSYSTEM=UCRT64 /c/msys64/usr/bin/bash.exe -l -c "
              cd \"${CURRENT_DIR}\" &&
              cmake ${CMAKE_ARGS} -DCMAKE_BUILD_TYPE=${{ matrix.config }} -B build/${{ matrix.config }} &&
              cmake --build build/${{ matrix.config }} -- -j\$(nproc)
            "
          elif [[ "${{ matrix.platform }}" == "windows" ]]; then
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              cmake ${CMAKE_ARGS} -G "Visual Studio 18 2026" -A x64 -B build
            else
              cmake ${CMAKE_ARGS} -G "Visual Studio 18 2026" -A Win32 -B build
            fi
            cmake --build build --config ${{ matrix.config }} --parallel
          elif [[ "${{ matrix.platform }}" == "macos" ]]; then
            cmake ${CMAKE_ARGS} -DCMAKE_BUILD_TYPE=${{ matrix.config }} -B build/${{ matrix.config }}
            cmake --build build/${{ matrix.config }} -- -j$(sysctl -n hw.ncpu)
          else
            cmake ${CMAKE_ARGS} -DCMAKE_BUILD_TYPE=${{ matrix.config }} -B build/${{ matrix.config }}
            cmake --build build/${{ matrix.config }} -- -j$(nproc)
          fi
      - if: (matrix.platform == 'macos')
        name: Code signing, notarization, and packaging
        run: |
          cd build/${{ matrix.config }}
          if [[ "${{ vars.MACOS_CODESIGN }}" == "1" && "${{ github.event_name }}" == "push" ]]; then
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            echo "${{ secrets.MACOS_CODESIGN_P12 }}" | base64 --decode > certificate.p12
            security create-keychain -p "${{ secrets.MACOS_CODESIGN_P12_PASSWORD }}" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "${{ secrets.MACOS_CODESIGN_P12_PASSWORD }}" $KEYCHAIN_PATH
            security import certificate.p12 -P "${{ secrets.MACOS_CODESIGN_P12_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH
            find VPinballX_${{ matrix.type }}.app/Contents/Resources/plugins -type f -name '*.dylib' -exec \
               codesign --verbose --timestamp --options runtime --force --sign "${{ secrets.MACOS_CODESIGN_DEVELOPER_ID }}" {} \;
            codesign --verbose --timestamp --options runtime --deep --force --sign "${{ secrets.MACOS_CODESIGN_DEVELOPER_ID }}" VPinballX_${{ matrix.type }}.app
            ditto -c -k --rsrc --keepParent VPinballX_${{ matrix.type }}.app VPinballX_${{ matrix.type }}.zip
            xcrun notarytool submit VPinballX_${{ matrix.type }}.zip  \
              --wait \
              --apple-id "${{ secrets.MACOS_CODESIGN_APPLE_ID }}" \
              --password "${{ secrets.MACOS_CODESIGN_PASSWORD }}" \
              --team-id "${{ secrets.MACOS_CODESIGN_TEAM_ID }}"
            xcrun stapler staple VPinballX_${{ matrix.type }}.app
          fi
          create-dmg \
            --volname "VPinballX_${{ matrix.type }}-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}" \
            --volicon ../../standalone/macos/VPinballX.icns \
            --window-pos 200 120 \
            --window-size 520 320 \
            --icon-size 64 \
            --icon "VPinballX_${{ matrix.type }}.app" 130 120 \
            --app-drop-link 390 120 \
            VPinballX_${{ matrix.type }}-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}.dmg \
            VPinballX_${{ matrix.type }}.app
      - name: Stage artifacts
        run: |
          mkdir tmp
          if [[ "${{ matrix.platform }}" == "windows" || "${{ matrix.platform }}" == "windows-mingw" ]]; then
            mkdir stage
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              cp build/${{ matrix.config }}/VPinballX_${{ matrix.type }}64.exe stage
            else
              cp build/${{ matrix.config }}/VPinballX_${{ matrix.type }}.exe stage
            fi
            cp build/${{ matrix.config }}/*.dll stage
            if [[ "${{ matrix.type }}" == "GL" ]]; then
              cp -r build/${{ matrix.config }}/shaders-${{ needs.version.outputs.version_short }} stage
            fi
            cp -r build/${{ matrix.config }}/assets stage
            cp -r build/${{ matrix.config }}/plugins stage
            cp -r build/${{ matrix.config }}/scripts stage
            cp -r build/${{ matrix.config }}/docs stage
            cd stage && 7z a -r ../tmp/VPinballX_${{ matrix.type }}-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}.zip .
          elif [[ "${{ matrix.platform }}" == "macos" ]]; then
            cp build/${{ matrix.config }}/*.dmg tmp
          elif [[ "${{ matrix.platform }}" == "linux" ]]; then
            mkdir stage
            cp build/${{ matrix.config }}/VPinballX_${{ matrix.type }} stage
            cp -a build/${{ matrix.config }}/*.{so,so.*} stage
            if [[ "${{ matrix.type }}" == "GL" ]]; then
              cp -r build/${{ matrix.config }}/shaders-${{ needs.version.outputs.version_short }} stage
            fi
            cp -r build/${{ matrix.config }}/assets stage
            cp -r build/${{ matrix.config }}/plugins stage
            cp -r build/${{ matrix.config }}/scripts stage
            cp -r build/${{ matrix.config }}/docs stage
            tar czf tmp/VPinballX_${{ matrix.type }}-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}.tar.gz -C stage .
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VPinballX_${{ matrix.type }}-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}
          path: tmp/*
          archive: false

  build-dx:
    name: Build VPinballX-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}
    runs-on: windows-2025-vs2026
    needs: [ version, matrix ]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.dx) }}
    steps:
      - uses: microsoft/setup-msbuild@v3
      - if: (matrix.platform == 'windows')
        run: |
          /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm make diffutils nasm autoconf automake libtool"
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-zlib mingw-w64-ucrt-x86_64-libwinpthread mingw-w64-ucrt-x86_64-libiconv mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-tools"
          else
            /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm mingw-w64-i686-gcc mingw-w64-i686-zlib mingw-w64-i686-libwinpthread mingw-w64-i686-libiconv mingw-w64-i686-cmake"
          fi
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/${{ matrix.platform }}-${{ matrix.arch }}/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: external
          key: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}-external-
      - name: Build external cache
        run: |
          BUILD_TYPE=${{ matrix.config }} ./platforms/${{ matrix.platform }}-${{ matrix.arch }}/external.sh
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Clean external cache
        run: |
          find external -type d -name ".git" -exec rm -rf {} + 2>/dev/null || true
          find external -name "*.tar.gz" -delete 2>/dev/null || true
          find external \( -name "*.o" -o -name "*.obj" \) -delete 2>/dev/null || true
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Save external cache
        uses: actions/cache/save@v5
        with:
          path: external
          key: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}-external-${{ env.EXT_HASH }}
      - name: Setup build tools
        run: |
          # cmake can't find fxc.exe so copy one into the a directory in the path
          cp "/c/Program Files (x86)/Windows Kits/10/bin/10.0.26100.0/x86/fxc.exe" /mingw64/bin
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha_short }}/g" src/core/git_version.h
      - name: Build
        run : |
          CMAKE_ARGS="-DRENDERER=DX9 -DPLATFORM=${{ matrix.platform }} -DARCH=${{ matrix.arch }}"
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            cmake ${CMAKE_ARGS} -G "Visual Studio 18 2026" -A x64 -B build
          else
            cmake ${CMAKE_ARGS} -G "Visual Studio 18 2026" -A Win32 -B build
          fi
          cmake --build build --config ${{ matrix.config }}
      - name: Stage artifacts
        run: |
          mkdir tmp stage
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            cp build/${{ matrix.config }}/VPinballX64.exe stage
          else
            cp build/${{ matrix.config }}/VPinballX.exe stage
          fi
          cp build/${{ matrix.config }}/*.dll stage
          cp -r build/${{ matrix.config }}/assets stage
          cp -r build/${{ matrix.config }}/scripts stage
          cp -r build/${{ matrix.config }}/docs stage
          cd stage && 7z a -r ../tmp/VPinballX-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}.zip .
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VPinballX-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}
          path: tmp/*
          archive: false

  build-sbc:
    name: Build VPinballX_${{ matrix.type }}-${{ matrix.board }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    needs: [ version, matrix ]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.sbc) }}
    steps:
      - run: |
          sudo apt-get update
          sudo apt install cmake nasm bison zlib1g-dev libdrm-dev libgbm-dev libglu1-mesa-dev libegl-dev libgl1-mesa-dev libwayland-dev libwayland-egl-backend-dev libudev-dev libx11-dev libxcursor-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libxrandr-dev libasound2-dev libgpiod-dev
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/${{ matrix.platform }}-${{ matrix.arch }}/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: external
          key: sbc-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            sbc-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}-external-
      - name: Build external cache
        run: |
          BUILD_TYPE=${{ matrix.config }} ./platforms/${{ matrix.platform }}-${{ matrix.arch }}/external.sh
      - if: github.event_name == 'push' && steps.cache.outputs.cache-hit != 'true'
        name: Clean external cache
        run: |
          find external -type d -name ".git" -exec rm -rf {} + 2>/dev/null || true
          find external -name "*.tar.gz" -delete 2>/dev/null || true
          find external \( -name "*.o" -o -name "*.obj" \) -delete 2>/dev/null || true
      - if: github.event_name == 'push' && steps.cache.outputs.cache-hit != 'true'
        name: Save external cache
        uses: actions/cache/save@v5
        with:
          path: external
          key: sbc-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}-external-${{ env.EXT_HASH }}
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha_short }}/g" src/core/git_version.h
      - name: Build
        run: |
          OPTIONS=""
          if [[ "${{ matrix.board }}" == "rpi" ]]; then
            OPTIONS="-DBUILD_RPI=ON"
          elif [[ "${{ matrix.board }}" == "rk3588" ]]; then
            OPTIONS="-DBUILD_RK3588=ON"
          fi
          cmake -DRENDERER=${{ matrix.type }} -DPLATFORM=${{ matrix.platform }} -DARCH=${{ matrix.arch }} -DCMAKE_BUILD_TYPE=${{ matrix.config }} ${OPTIONS} -B build/${{ matrix.config }}
          cmake --build build/${{ matrix.config }} -- -j$(nproc)
      - name: Stage artifacts
        run: |
          mkdir tmp
          mkdir stage
          cp build/${{ matrix.config }}/VPinballX_${{ matrix.type }} stage
          cp -a build/${{ matrix.config }}/*.{so,so.*} stage
          if [[ "${{ matrix.type }}" == "GL" ]]; then
            cp -r build/${{ matrix.config }}/shaders-${{ needs.version.outputs.version_short }} stage
          fi
          cp -r build/${{ matrix.config }}/assets stage
          cp -r build/${{ matrix.config }}/plugins stage
          cp -r build/${{ matrix.config }}/scripts stage
          cp -r build/${{ matrix.config }}/docs stage
          tar czf tmp/VPinballX_${{ matrix.type }}-${{ needs.version.outputs.tag }}-${{ matrix.board }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}.tar.gz -C stage .
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VPinballX_${{ matrix.type }}-${{ needs.version.outputs.tag }}-${{ matrix.board }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}
          path: tmp/*
          archive: false

  build-ios:
    name: Build VPinballX_BGFX-ios-${{ matrix.config }}
    runs-on: macos-15
    needs: [ version ]
    strategy:
      fail-fast: false
      matrix:
        config: [ Release ]
    steps:
      - run: |
          brew install bison autoconf automake libtool ldid
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/ios-arm64/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: external
          key: ios-arm64-${{ matrix.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            ios-arm64-${{ matrix.config }}-external-
      - name: Build external cache
        run: |
          BUILD_TYPE=${{ matrix.config }} ./platforms/ios-arm64/external.sh
      - if: github.event_name == 'push' && steps.cache.outputs.cache-hit != 'true'
        name: Clean external cache
        run: |
          find external -type d -name ".git" -exec rm -rf {} + 2>/dev/null || true
          find external -name "*.tar.gz" -delete 2>/dev/null || true
          find external \( -name "*.o" -o -name "*.obj" \) -delete 2>/dev/null || true
      - if: github.event_name == 'push' && steps.cache.outputs.cache-hit != 'true'
        name: Save external cache
        uses: actions/cache/save@v5
        with:
          path: external
          key: ios-arm64-${{ matrix.config }}-external-${{ env.EXT_HASH }}
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha_short }}/g" src/core/git_version.h
      - name: Build libvpinball
        run: |
          cmake \
                -DPLATFORM=ios \
                -DARCH=arm64 \
                -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
                -B build/ios-arm64
          cmake --build build/ios-arm64 -- -j$(sysctl -n hw.ncpu)
      - name: Build app
        run: |
          sudo xcode-select -switch /Applications/Xcode_26.3.app
          MARKETING_VERSION="${{ needs.version.outputs.version_ios }}"
          CURRENT_PROJECT_VERSION="${{ needs.version.outputs.version_full }}"
          cd standalone/ios
          perl -i -pe "s/MARKETING_VERSION = [0-9.]+/MARKETING_VERSION = $MARKETING_VERSION/g" "VPinball.xcodeproj/project.pbxproj"
          perl -i -pe "s/CURRENT_PROJECT_VERSION = [0-9.]+/CURRENT_PROJECT_VERSION = $CURRENT_PROJECT_VERSION/g" "VPinball.xcodeproj/project.pbxproj"
          fastlane build_unsigned_ipa
      - name: Stage artifacts
        run: |
          mkdir tmp
          cp standalone/ios/fastlane/VPinballX.ipa tmp/VPinballX_BGFX-${{ needs.version.outputs.tag }}-ios-${{ matrix.config }}.ipa
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VPinballX_BGFX-${{ needs.version.outputs.tag }}-ios-${{ matrix.config }}
          path: tmp/*
          archive: false

  build-android:
    name: Build VPinballX_BGFX-android-${{ matrix.flavor }}-${{ matrix.config }}
    runs-on: ubuntu-24.04
    needs: [ version, matrix ]
    strategy:
      fail-fast: false
      matrix:
        config: [ Release ]
        flavor: ${{ fromJSON(needs.matrix.outputs.android_flavors) }}
    env:
      ANDROID_NDK: /usr/local/lib/android/sdk/ndk/28.2.13676358
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/28.2.13676358
      ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/28.2.13676358
    steps:
      - run: |
          sudo apt install bison
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/checkout@v6
      - name: Calculate external cache hash
        run: |
          echo "EXT_HASH=$(cat platforms/config.sh platforms/android-arm64-v8a/external.sh | sha256sum | cut -c1-12)" >> $GITHUB_ENV
      - name: Restore external cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: external
          key: android-arm64-v8a-${{ matrix.config }}-external-${{ env.EXT_HASH }}
          restore-keys: |
            android-arm64-v8a-${{ matrix.config }}-external-
      - name: Build external cache
        run: |
          BUILD_TYPE=${{ matrix.config }} ./platforms/android-arm64-v8a/external.sh
      - if: github.event_name == 'push' && steps.cache.outputs.cache-hit != 'true'
        name: Clean external cache
        run: |
          find external -type d -name ".git" -exec rm -rf {} + 2>/dev/null || true
          find external -name "*.tar.gz" -delete 2>/dev/null || true
          find external \( -name "*.o" -o -name "*.obj" \) -delete 2>/dev/null || true
      - if: github.event_name == 'push' && steps.cache.outputs.cache-hit != 'true'
        name: Save external cache
        uses: actions/cache/save@v5
        with:
          path: external
          key: android-arm64-v8a-${{ matrix.config }}-external-${{ env.EXT_HASH }}
      - name: Set version
        run: |
          perl -i -pe"s/9999/${{ needs.version.outputs.revision }}/g" src/core/git_version.h
          perl -i -pe"s/unknown/${{ needs.version.outputs.sha_short }}/g" src/core/git_version.h
      - name: Build libvpinball
        run: |
          if [[ "${{ matrix.flavor }}" == "quest" ]]; then
            cmake \
                  -DPLATFORM=android \
                  -DARCH=arm64-v8a \
                  -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
                  -DENABLE_XR=ON \
                  -B build/android-arm64-v8a
          else
            cmake \
                  -DPLATFORM=android \
                  -DARCH=arm64-v8a \
                  -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
                  -B build/android-arm64-v8a
          fi
          cmake --build build/android-arm64-v8a -- -j$(nproc)
      - if: github.event_name == 'push' && github.repository == 'vpinball/vpinball'
        name: Build app
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd standalone/android
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > app/vpinball.jks
          FLAVOR="${{ matrix.flavor }}"
          FLAVOR_CAPITALIZED="$(echo "${FLAVOR:0:1}" | tr '[:lower:]' '[:upper:]')${FLAVOR:1}"
          ./gradlew \
            assemble${FLAVOR_CAPITALIZED}${{ matrix.config }} \
            bundle${FLAVOR_CAPITALIZED}${{ matrix.config }} \
            -PversionName="${{ needs.version.outputs.version_full }}" \
            -Psha_short="${{ needs.version.outputs.sha_short }}"
      - if: github.event_name == 'pull_request' || github.repository != 'vpinball/vpinball'
        name: Build app (fork)
        run: |
          export ANDROID_KEYSTORE_PASSWORD=vpinball
          export ANDROID_KEY_ALIAS=vpinball
          export ANDROID_KEY_PASSWORD=vpinball
          cd standalone/android
          keytool -genkey -v -keystore app/vpinball.jks \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -storepass "$ANDROID_KEYSTORE_PASSWORD" \
                -keypass "$ANDROID_KEY_PASSWORD" \
                -alias "$ANDROID_KEY_ALIAS" \
                -dname "CN=VPinball Android, O=VPinball, C=XX"
          FLAVOR="${{ matrix.flavor }}"
          FLAVOR_CAPITALIZED="$(echo "${FLAVOR:0:1}" | tr '[:lower:]' '[:upper:]')${FLAVOR:1}"
          ./gradlew \
            assemble${FLAVOR_CAPITALIZED}${{ matrix.config }} \
            bundle${FLAVOR_CAPITALIZED}${{ matrix.config }} \
            -PversionName="${{ needs.version.outputs.version_full }}" \
            -Psha_short="${{ needs.version.outputs.sha_short }}"
      - name: Stage apk/aab artifacts
        run: |
          CONFIG_LC=$(echo "${{ matrix.config }}" | tr '[:upper:]' '[:lower:]')
          FLAVOR_LC=$(echo "${{ matrix.flavor }}" | tr '[:upper:]' '[:lower:]')
          mkdir tmp-apk
          cp standalone/android/app/build/outputs/apk/${FLAVOR_LC}/${CONFIG_LC}/*.apk tmp-apk/VPinballX_BGFX-${{ needs.version.outputs.tag }}-android-${{ matrix.flavor }}-${{ matrix.config }}.apk
          if [[ "${{ github.repository }}" == "vpinball/vpinball" ]]; then
             mkdir tmp-aab
             cp standalone/android/app/build/outputs/bundle/${FLAVOR_LC}${{ matrix.config }}/*.aab tmp-aab/VPinballX_BGFX-${{ needs.version.outputs.tag }}-android-${{ matrix.flavor }}-${{ matrix.config }}.aab
          fi
      - name: Upload apk
        uses: actions/upload-artifact@v7
        with:
          name: VPinballX_BGFX-${{ needs.version.outputs.tag }}-android-${{ matrix.flavor }}-${{ matrix.config }}-apk
          path: tmp-apk/*
          archive: false
      - if: github.repository == 'vpinball/vpinball'
        name: Upload aab
        uses: actions/upload-artifact@v7
        with:
          name: VPinballX_BGFX-${{ needs.version.outputs.tag }}-android-${{ matrix.flavor }}-${{ matrix.config }}-aab
          path: tmp-aab/*
          archive: false
